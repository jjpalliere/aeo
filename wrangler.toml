name = "aeo"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

# --- Production (default) ---
[[d1_databases]]
binding = "DB"
database_name = "aeo-db"
database_id = "c8328931-24a2-421c-a73a-e732c00b49a7"

[[kv_namespaces]]
binding = "KV"
id = "6f792aef4e41455f92397167aac95e9b"

# Cron: garbage collection + stalled run recovery (daily at 3am UTC)
[triggers]
crons = ["0 3 * * *"]

# Secrets — set via:
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put OPENAI_API_KEY
# wrangler secret put GOOGLE_AI_API_KEY
# wrangler secret put RESEND_API_KEY
# wrangler secret put SITE_URL   # Optional: base URL for magic links (e.g. https://aeo.jjpalier.dev)

# --- Dev environment ---
# Create before use:
#   wrangler d1 create aeo-db-dev
#   wrangler kv namespace create KV --env dev
# Then fill in the IDs below.

# [env.dev]
# [[env.dev.d1_databases]]
# binding = "DB"
# database_name = "aeo-db-dev"
# database_id = "<create-via: wrangler d1 create aeo-db-dev>"
#
# [[env.dev.kv_namespaces]]
# binding = "KV"
# id = "<create-via: wrangler kv namespace create KV --env dev>"
