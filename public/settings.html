<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/assets/auth.js"></script>
  <title>Settings — AEO</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <style>
    body { display: flex; min-height: 100vh; margin: 0; background: #0a0a0a; }
    .sb-page-layout { display: flex; flex: 1; }
    #aeo-sidebar {
      width: var(--sidebar-width); min-width: var(--sidebar-width);
      background: rgba(17,17,17,0.92); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; z-index: 50;
    }
    .page-main {
      margin-left: var(--sidebar-width); flex: 1; padding: 48px 40px; max-width: 640px;
    }
    h1 { font-family: var(--font-hero); font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); margin-bottom: 32px; }
    .section { margin-bottom: 40px; }
    .section-title { font-size: var(--text-xs); letter-spacing: 0.14em; text-transform: uppercase; color: var(--text2); margin-bottom: 16px; }
    .field-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .field-label { font-size: var(--text-sm); color: var(--text2); }
    .field-value { font-size: var(--text-sm); color: var(--text); }
    .team-switch-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .team-switch-item:hover { background: var(--surface); }
    .team-switch-item.active { color: var(--accent); }
    .team-switch-name { font-size: var(--text-sm); color: var(--text); }
    .team-switch-meta { font-size: var(--text-xs); color: var(--text3); }
    .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); font-family: var(--font); font-size: var(--text-xs); letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 20px; cursor: pointer; transition: background 0.15s; }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }
    #status { font-size: var(--text-xs); color: var(--text2); min-height: 16px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="sb-page-layout">
    <div id="aeo-sidebar"></div>
    <main class="page-main">
      <h1>Settings</h1>

      <div class="section">
        <div class="section-title">Account</div>
        <div class="field-row">
          <span class="field-label">Email</span>
          <span class="field-value" id="user-email">—</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Switch Team</div>
        <div id="team-list">Loading…</div>
      </div>

      <div class="section">
        <div class="section-title">Create New Team</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="new-team-name" placeholder="Team name" style="flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:var(--text-sm);padding:8px 12px;outline:none;border-radius:0" />
          <button class="btn btn-primary" onclick="createTeam()" style="white-space:nowrap">Create</button>
        </div>
        <div id="create-status" style="font-size:var(--text-xs);color:var(--text2);min-height:16px;margin-top:8px"></div>
      </div>

      <div class="section">
        <button class="btn-danger" onclick="logout()">Log Out</button>
        <div id="status"></div>
      </div>
    </main>
  </div>

  <script src="/assets/sidebar.js"></script>
  <script>
    initSidebar()

    function waitForUser() {
      return new Promise(resolve => {
        if (window.__aeo_user) return resolve(window.__aeo_user)
        const i = setInterval(() => {
          if (window.__aeo_user) { clearInterval(i); resolve(window.__aeo_user) }
        }, 50)
        setTimeout(() => { clearInterval(i); resolve({}) }, 5000)
      })
    }

    waitForUser().then(user => {
      document.getElementById('user-email').textContent = user.email || '—'
      loadTeams()
    })

    async function loadTeams() {
      const el = document.getElementById('team-list')
      try {
        const res = await fetch('/api/teams')
        const data = await res.json()
        const user = window.__aeo_user || {}
        const teams = data.teams || []
        if (teams.length === 0) {
          el.innerHTML = '<div style="color:var(--text3);font-size:var(--text-sm)">No teams</div>'
          return
        }
        el.innerHTML = teams.map(t => `
          <div class="team-switch-item ${t.id === user.active_team_id ? 'active' : ''}" onclick="switchTeam('${t.id}')">
            <div>
              <div class="team-switch-name">${t.name}${t.id === user.active_team_id ? ' ●' : ''}</div>
              <div class="team-switch-meta">${t.member_count || 0} member${(t.member_count||0) !== 1 ? 's' : ''} · ${t.brand_count || 0} brand${(t.brand_count||0) !== 1 ? 's' : ''}</div>
            </div>
          </div>
        `).join('')
      } catch (err) {
        el.innerHTML = '<div style="color:var(--danger)">Failed to load teams</div>'
      }
    }

    async function switchTeam(teamId) {
      try {
        await fetch('/api/auth/active', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ team_id: teamId }),
        })
        window.location.reload()
      } catch (err) {
        document.getElementById('status').textContent = 'Failed to switch team'
      }
    }

    async function createTeam() {
      const name = document.getElementById('new-team-name').value.trim()
      if (!name) return
      const status = document.getElementById('create-status')
      try {
        const res = await fetch('/api/teams', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        })
        const data = await res.json()
        if (res.ok) {
          status.innerHTML = '<span style="color:var(--success)">Team created! Switching…</span>'
          await switchTeam(data.id)
        } else {
          status.innerHTML = `<span style="color:var(--danger)">${data.error || 'Failed'}</span>`
        }
      } catch (err) {
        status.innerHTML = '<span style="color:var(--danger)">Connection error</span>'
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' })
      window.location.href = '/login.html'
    }
  </script>
</body>
</html>
