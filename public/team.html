<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/assets/auth.js"></script>
  <title>Team — AEO</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <style>
    body { display: flex; min-height: 100vh; margin: 0; background: #0a0a0a; }
    .sb-page-layout { display: flex; flex: 1; }
    #aeo-sidebar {
      width: var(--sidebar-width); min-width: var(--sidebar-width);
      background: rgba(17,17,17,0.92); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; z-index: 50;
    }
    .page-main {
      margin-left: var(--sidebar-width); flex: 1; padding: 48px 40px; max-width: 640px;
    }
    h1 { font-family: var(--font-hero); font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); margin-bottom: 32px; }
    .section { margin-bottom: 40px; }
    .section-title { font-size: var(--text-xs); letter-spacing: 0.14em; text-transform: uppercase; color: var(--text2); margin-bottom: 16px; }
    .member-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .member-email { font-size: var(--text-sm); color: var(--text); }
    .member-date { font-size: var(--text-xs); color: var(--text3); }
    .invite-code-box {
      background: var(--surface); border: 1px solid var(--border2); padding: 16px 20px;
      font-family: var(--font); font-size: 20px; letter-spacing: 0.2em; color: var(--accent);
      text-align: center; cursor: pointer; user-select: all;
    }
    .invite-code-box:hover { border-color: var(--accent); }
    .invite-hint { font-size: var(--text-xs); color: var(--text3); margin-top: 8px; text-align: center; }
    .join-row { display: flex; gap: 8px; align-items: center; }
    .join-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border2); color: var(--text);
      font-family: var(--font); font-size: var(--text-sm); padding: 8px 12px; outline: none;
      border-radius: 0; text-transform: uppercase; letter-spacing: 0.15em;
    }
    #join-status, #leave-status { font-size: var(--text-xs); color: var(--text2); min-height: 16px; margin-top: 8px; }
    .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); font-family: var(--font); font-size: var(--text-xs); letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 20px; cursor: pointer; }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }
  </style>
</head>
<body>
  <div class="sb-page-layout">
    <div id="aeo-sidebar"></div>
    <main class="page-main">
      <h1>Team <span id="team-name" style="color:var(--text2)"></span></h1>

      <div class="section">
        <div class="section-title">Invite Code</div>
        <div class="invite-code-box" id="invite-code" onclick="copyCode()" title="Click to copy">—</div>
        <div class="invite-hint">Share this code with teammates so they can join your team</div>
      </div>

      <div class="section">
        <div class="section-title">Members</div>
        <div id="members-list">Loading…</div>
      </div>

      <div class="section">
        <div class="section-title">Join Another Team</div>
        <div class="join-row">
          <input type="text" class="join-input" id="join-code" placeholder="XXXX-XXXX" />
          <button class="btn btn-primary" onclick="joinTeam()">Join</button>
        </div>
        <div id="join-status"></div>
      </div>

      <div class="section">
        <button class="btn-danger" onclick="leaveTeam()">Leave This Team</button>
        <div id="leave-status"></div>
      </div>
    </main>
  </div>

  <script src="/assets/sidebar.js"></script>
  <script>
    initSidebar()

    function escHtml(s) {
      const d = document.createElement('div')
      d.textContent = s
      return d.innerHTML
    }

    let activeTeamId = null

    function waitForUser() {
      return new Promise(resolve => {
        if (window.__aeo_user) return resolve(window.__aeo_user)
        const i = setInterval(() => {
          if (window.__aeo_user) { clearInterval(i); resolve(window.__aeo_user) }
        }, 50)
        setTimeout(() => { clearInterval(i); resolve({}) }, 5000)
      })
    }

    waitForUser().then(user => {
      activeTeamId = user.active_team_id
      document.getElementById('team-name').textContent = user.team_name || ''
      loadTeamDetails()
    })

    async function loadTeamDetails() {
      if (!activeTeamId) return

      // Get invite code from teams list
      try {
        const res = await fetch('/api/teams')
        const data = await res.json()
        const team = (data.teams || []).find(t => t.id === activeTeamId)
        if (team) {
          document.getElementById('invite-code').textContent = team.invite_code || '—'
        }
      } catch {}

      // Get members
      try {
        const res = await fetch(`/api/teams/${activeTeamId}/members`)
        const data = await res.json()
        const members = data.members || []
        const el = document.getElementById('members-list')
        if (members.length === 0) {
          el.innerHTML = '<div style="color:var(--text3)">No members</div>'
          return
        }
        el.innerHTML = members.map(m => `
          <div class="member-row">
            <span class="member-email">${escHtml(m.email)}</span>
            <span class="member-date">${new Date(m.joined_at).toLocaleDateString()}</span>
          </div>
        `).join('')
      } catch {
        document.getElementById('members-list').innerHTML = '<div style="color:var(--danger)">Failed to load</div>'
      }
    }

    function copyCode() {
      const code = document.getElementById('invite-code').textContent
      if (code && code !== '—') {
        navigator.clipboard.writeText(code).then(() => {
          document.getElementById('invite-code').style.borderColor = 'var(--success)'
          setTimeout(() => { document.getElementById('invite-code').style.borderColor = '' }, 1500)
        })
      }
    }

    async function joinTeam() {
      const code = document.getElementById('join-code').value.trim()
      if (!code) return
      const status = document.getElementById('join-status')
      try {
        const res = await fetch('/api/teams/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ invite_code: code }),
        })
        const data = await res.json()
        if (res.ok) {
          status.innerHTML = `<span style="color:var(--success)">Joined ${data.team_name}! Switching…</span>`
          // Switch to the new team
          await fetch('/api/auth/active', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ team_id: data.team_id }),
          })
          setTimeout(() => window.location.reload(), 1000)
        } else {
          status.innerHTML = `<span style="color:var(--danger)">${data.error || 'Failed'}</span>`
        }
      } catch {
        status.innerHTML = '<span style="color:var(--danger)">Connection error</span>'
      }
    }

    async function leaveTeam() {
      if (!activeTeamId) return
      if (!confirm('Leave this team? You will lose access to all its brands and data.')) return
      const status = document.getElementById('leave-status')
      try {
        const res = await fetch(`/api/teams/${activeTeamId}/leave`, { method: 'DELETE' })
        const data = await res.json()
        if (res.ok) {
          status.innerHTML = '<span style="color:var(--success)">Left team. Redirecting…</span>'
          setTimeout(() => window.location.href = '/settings.html', 1000)
        } else {
          status.innerHTML = `<span style="color:var(--danger)">${data.error || 'Failed'}</span>`
        }
      } catch {
        status.innerHTML = '<span style="color:var(--danger)">Connection error</span>'
      }
    }
  </script>
</body>
</html>
