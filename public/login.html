<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>terrain.run</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <style>
    html, body {
      background: #080807 !important;
      overflow: hidden;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .frost-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      backdrop-filter: blur(2.5px);
      -webkit-backdrop-filter: blur(2.5px);
      background: rgba(8,8,28,0.2);
      pointer-events: none;
    }
    .frost-overlay::after { display: none; }

    .login-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      padding: 0 24px;
    }

    /* Brand — clean inline wordmark */
    .login-brand {
      font-family: var(--font-display);
      text-align: center;
      margin-bottom: 56px;
      line-height: 1;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    /* Horizontal rule accent */
    .login-rule {
      width: 48px;
      height: 1px;
      background: var(--border2);
      margin-bottom: 48px;
    }

    /* Input — just a line */
    .login-input-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
    }
    .login-prefix {
      font-size: var(--text-sm);
      color: var(--text3);
      padding-right: 10px;
      user-select: none;
    }
    #pwd {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border2);
      border-radius: 0;
      padding: 10px 0;
      font-family: var(--font);
      font-size: var(--text-sm);
      letter-spacing: 0.2em;
      color: var(--text);
      text-align: left;
      outline: none;
      -webkit-text-security: disc;
    }
    #pwd::placeholder {
      color: var(--text3);
      letter-spacing: 0.08em;
      -webkit-text-security: none;
    }
    #pwd:focus { border-bottom-color: var(--text2); }

    /* Submit — ghost, minimal */
    .login-submit {
      background: none;
      border: none;
      color: var(--text3);
      font-family: var(--font);
      font-size: var(--text-xs);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 10px 0 10px 14px;
      transition: color 0.2s;
    }
    .login-submit:hover { color: var(--text); }

    /* Error */
    #err {
      font-size: var(--text-xs);
      letter-spacing: 0.08em;
      color: var(--danger);
      min-height: 14px;
      text-align: center;
      text-transform: uppercase;
      opacity: 0.8;
    }

  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="frost-overlay"></div>

  <div class="login-container">
    <div id="login-logo" class="login-brand"></div>
    <div class="login-rule"></div>
    <div class="login-input-wrap">
      <span class="login-prefix">›</span>
      <input
        type="password"
        id="pwd"
        placeholder="enter"
        autocomplete="current-password"
        autofocus
      />
      <button class="login-submit" onclick="submit()">→</button>
    </div>
    <div id="err"></div>
  </div>

  <script src="/assets/tr-logo-anim.js"></script>
  <script>
    initTRLogo('#login-logo', { size: window.innerWidth <= 768 ? 120 : 200 });
  </script>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="/assets/background.js"></script>
  <script>
    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit()
    })

    async function submit() {
      const pwd = document.getElementById('pwd').value
      if (!pwd) return
      const btn = document.querySelector('.login-submit')
      const err = document.getElementById('err')
      btn.style.opacity = '0.3'
      btn.style.pointerEvents = 'none'
      err.textContent = ''
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd }),
        })
        if (res.ok) {
          window.location.href = '/'
        } else {
          err.textContent = 'no'
          btn.style.opacity = '1'
          btn.style.pointerEvents = 'auto'
          const input = document.getElementById('pwd')
          input.value = ''
          input.focus()
        }
      } catch {
        err.textContent = 'connection error'
        btn.style.opacity = '1'
        btn.style.pointerEvents = 'auto'
      }
    }
  </script>
</body>
</html>
