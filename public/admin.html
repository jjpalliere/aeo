<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/assets/auth.js"></script>
  <title>Admin — AEO</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <style>
    body { display: flex; min-height: 100vh; margin: 0; background: #0a0a0a; }
    .sb-page-layout { display: flex; flex: 1; }
    #aeo-sidebar {
      width: var(--sidebar-width); min-width: var(--sidebar-width);
      background: rgba(17,17,17,0.92); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; z-index: 50;
    }
    .page-main {
      margin-left: var(--sidebar-width); flex: 1; padding: 48px 40px; max-width: 800px;
    }
    h1 { font-family: var(--font-hero); font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); margin-bottom: 32px; }
    .section { margin-bottom: 40px; }
    .section-title { font-size: var(--text-xs); letter-spacing: 0.14em; text-transform: uppercase; color: var(--text2); margin-bottom: 16px; }
    .section-actions { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: var(--text-xs); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { font-size: var(--text-sm); color: var(--text); padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .code-cell { font-family: var(--font); letter-spacing: 0.15em; color: var(--accent); }
    .used-cell { color: var(--text3); }
    #gen-status { font-size: var(--text-xs); color: var(--text2); min-height: 16px; margin-top: 8px; }
    .fallback-token { font-family: var(--font); font-size: var(--text-xs); color: var(--text3); word-break: break-all; }
    .not-owner { text-align: center; margin-top: 20vh; color: var(--text3); font-size: var(--text-sm); }
  </style>
</head>
<body>
  <div class="sb-page-layout">
    <div id="aeo-sidebar"></div>
    <main class="page-main">
      <div id="admin-content">
        <h1>Admin</h1>
        <div id="loading" style="color:var(--text3)">Loading…</div>
      </div>
    </main>
  </div>

  <script src="/assets/sidebar.js"></script>
  <script>
    initSidebar()

    function escHtml(s) {
      const d = document.createElement('div')
      d.textContent = s
      return d.innerHTML
    }

    function waitForUser() {
      return new Promise(resolve => {
        if (window.__aeo_user) return resolve(window.__aeo_user)
        const i = setInterval(() => {
          if (window.__aeo_user) { clearInterval(i); resolve(window.__aeo_user) }
        }, 50)
        setTimeout(() => { clearInterval(i); resolve({}) }, 5000)
      })
    }

    waitForUser().then(user => {
      if (!user.is_owner) {
        document.getElementById('admin-content').innerHTML = '<div class="not-owner">Owner access required</div>'
        return
      }
      document.getElementById('loading').style.display = 'none'
      renderAdmin()
    })

    async function renderAdmin() {
      const content = document.getElementById('admin-content')
      content.innerHTML = `
        <h1>Admin</h1>

        <div class="section">
          <div class="section-title">Join requests</div>
          <div class="section-actions">
            <label style="font-size:var(--text-xs);color:var(--text3)">Status</label>
            <select id="jr-status" onchange="loadJoinRequests()" style="background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:6px 8px;font-family:var(--font);font-size:var(--text-sm)">
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
              <option value="all">All</option>
            </select>
            <button type="button" class="btn btn-ghost btn-sm" onclick="loadJoinRequests()">Refresh</button>
          </div>
          <div id="join-requests-table">Loading…</div>
        </div>

        <div class="section">
          <div class="section-title">Similarity mappings</div>
          <div id="admin-sim-example-line" style="padding:10px 14px;border:1px solid var(--border2);background:var(--surface2);margin:0 0 14px;font-size:var(--text-sm);color:var(--text);letter-spacing:0.04em"></div>
          <p style="font-size:var(--text-xs);color:var(--text3);margin:0 0 12px;line-height:1.5">
            Optional: map extra KV runs per brand. Global defaults (same for every brand) live in <code style="font-size:10px">sidebar.js</code> as <code style="font-size:10px">AEO_SIMILARITY_DEFAULT_RUNS</code>.
          </p>
          <div class="section-actions" style="flex-wrap:wrap">
            <label style="font-size:var(--text-xs);color:var(--text3)">Brand</label>
            <select id="sim-brand-select" onchange="loadSimilarityMappings()" style="min-width:200px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:6px 8px;font-family:var(--font);font-size:var(--text-sm)"></select>
            <button type="button" class="btn btn-ghost btn-sm" onclick="loadSimilarityKvKeys()">List KV keys</button>
          </div>
          <div id="sim-kv-status" style="font-size:var(--text-xs);color:var(--text2);min-height:18px;margin-bottom:8px"></div>
          <div id="sim-kv-keys" style="font-size:var(--text-xs);color:var(--text3);margin-bottom:12px;max-height:120px;overflow-y:auto"></div>
          <div class="section-actions" style="flex-wrap:wrap;align-items:flex-end">
            <div>
              <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">run_id (from KV)</div>
              <input type="text" id="sim-run-id" placeholder="paste key or run id" style="width:260px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:8px 10px;font-family:var(--font);font-size:var(--text-sm)" />
            </div>
            <div>
              <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Label</div>
              <input type="text" id="sim-label" placeholder="e.g. C5 Customer Service Bot" style="width:240px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:8px 10px;font-family:var(--font);font-size:var(--text-sm)" />
            </div>
            <button type="button" class="btn btn-primary" onclick="addSimilarityMapping()">Add mapping</button>
          </div>
          <div id="sim-map-status" style="font-size:var(--text-xs);margin-top:8px;min-height:16px"></div>
          <div id="sim-mappings-table" style="margin-top:16px">Select a brand…</div>
        </div>

        <div class="section">
          <div class="section-title">Signup Codes</div>
          <div class="section-actions">
            <button class="btn btn-primary" onclick="generateCode()">Generate Code</button>
            <input type="number" id="max-uses" value="1" min="1" max="100" style="width:60px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:6px 8px;font-family:var(--font);font-size:var(--text-sm);text-align:center" title="Max uses" />
            <span style="font-size:var(--text-xs);color:var(--text3)">max uses</span>
          </div>
          <div id="gen-status"></div>
          <div id="codes-table">Loading…</div>
        </div>

        <div class="section">
          <div class="section-title">Accounts</div>
          <div id="accounts-table">Loading…</div>
        </div>

        <div class="section">
          <div class="section-title">Fallback Magic Link Tokens</div>
          <div id="fallback-tokens" style="font-size:var(--text-xs);color:var(--text3)">Loading…</div>
        </div>
      `
      const exEl = document.getElementById('admin-sim-example-line')
      if (exEl) exEl.textContent = window.AEO_SIMILARITY_EXAMPLE

      loadJoinRequests()
      loadSimilarityBrands()
      loadCodes()
      loadAccounts()
      loadFallbackTokens()
    }

    async function loadSimilarityBrands() {
      const sel = document.getElementById('sim-brand-select')
      if (!sel) return
      try {
        const res = await fetch('/api/brands')
        const data = await res.json()
        const brands = data.brands || []
        sel.innerHTML = brands.map(b => `<option value="${b.id}">${escHtml(b.name || b.domain || b.id)}</option>`).join('')
        const u = window.__aeo_user || {}
        if (u.active_brand_id && brands.some(b => b.id === u.active_brand_id)) {
          sel.value = u.active_brand_id
        }
        loadSimilarityMappings()
      } catch {
        sel.innerHTML = '<option value="">Failed to load brands</option>'
      }
    }

    async function loadSimilarityMappings() {
      const el = document.getElementById('sim-mappings-table')
      const sel = document.getElementById('sim-brand-select')
      const brandId = sel?.value
      if (!brandId) {
        el.innerHTML = '<div style="color:var(--text3)">No brand</div>'
        return
      }
      try {
        const res = await fetch('/api/similarity/runs?brand_id=' + encodeURIComponent(brandId))
        const data = await res.json()
        const rows = data.runs || []
        if (rows.length === 0) {
          el.innerHTML = '<div style="color:var(--text3)">No mappings for this brand yet. List KV keys, pick run_id, add label, Add mapping.</div>'
          return
        }
        el.innerHTML = `<table>
          <tr><th>Label</th><th>run_id</th><th></th></tr>
          ${rows.map(r => `<tr>
            <td>${escHtml(r.label)}</td>
            <td class="code-cell" style="font-size:var(--text-xs)">${escHtml(r.run_id)}</td>
            <td><button type="button" class="btn btn-ghost btn-sm" onclick="deleteSimilarityMapping('${r.id}')">Remove</button></td>
          </tr>`).join('')}
        </table>`
      } catch {
        el.innerHTML = '<div style="color:var(--danger)">Failed to load mappings</div>'
      }
    }

    async function loadSimilarityKvKeys() {
      const status = document.getElementById('sim-kv-status')
      const box = document.getElementById('sim-kv-keys')
      status.textContent = 'Loading…'
      box.innerHTML = ''
      try {
        const res = await fetch('/api/similarity/available-runs')
        const data = await res.json()
        if (!res.ok) {
          status.innerHTML = `<span style="color:var(--danger)">${escHtml(data.error || res.statusText)}</span>`
          return
        }
        const keys = data.keys || []
        status.textContent = keys.length ? `${keys.length} key(s) — click one to copy run_id into the field` : 'No keys in this KV namespace (or empty).'
        window.__sim_kv_keys = keys
        box.innerHTML = keys.length
          ? `<div style="display:flex;flex-wrap:wrap;gap:6px">${keys.map((k, i) => `
            <button type="button" class="btn btn-ghost btn-sm" style="font-size:10px" onclick="document.getElementById('sim-run-id').value=window.__sim_kv_keys[${i}]">${escHtml(k.length > 40 ? k.slice(0, 38) + '…' : k)}</button>
          `).join('')}</div>`
          : ''
      } catch {
        status.innerHTML = '<span style="color:var(--danger)">Request failed</span>'
      }
    }

    async function addSimilarityMapping() {
      const status = document.getElementById('sim-map-status')
      const brandId = document.getElementById('sim-brand-select')?.value
      const runId = document.getElementById('sim-run-id')?.value?.trim()
      const label = document.getElementById('sim-label')?.value?.trim()
      status.textContent = ''
      if (!brandId || !runId || !label) {
        status.innerHTML = '<span style="color:var(--danger)">Brand, run_id, and label required</span>'
        return
      }
      try {
        const res = await fetch('/api/similarity/runs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ brand_id: brandId, run_id: runId, label }),
        })
        const data = await res.json()
        if (res.ok) {
          status.innerHTML = '<span style="color:var(--success)">Saved</span>'
          document.getElementById('sim-run-id').value = ''
          document.getElementById('sim-label').value = ''
          loadSimilarityMappings()
        } else {
          status.innerHTML = `<span style="color:var(--danger)">${escHtml(data.error || 'Failed')}</span>`
        }
      } catch {
        status.innerHTML = '<span style="color:var(--danger)">Connection error</span>'
      }
    }

    async function deleteSimilarityMapping(id) {
      if (!confirm('Remove this mapping?')) return
      try {
        const res = await fetch('/api/similarity/runs/' + encodeURIComponent(id), { method: 'DELETE' })
        const data = await res.json()
        if (res.ok) loadSimilarityMappings()
        else alert(data.error || 'Failed')
      } catch {
        alert('Connection error')
      }
    }

    async function loadJoinRequests() {
      const el = document.getElementById('join-requests-table')
      const status = document.getElementById('jr-status')?.value || 'pending'
      try {
        const res = await fetch('/api/admin/join-requests?status=' + encodeURIComponent(status))
        const data = await res.json()
        const rows = data.requests || []
        if (rows.length === 0) {
          el.innerHTML = '<div style="color:var(--text3)">No join requests</div>'
          return
        }
        el.innerHTML = `<table>
          <tr><th>Email</th><th>Message</th><th>Status</th><th>Created</th><th></th></tr>
          ${rows.map(r => {
            const msg = (r.message || '—').length > 80 ? escHtml((r.message || '').slice(0, 80)) + '…' : escHtml(r.message || '—')
            const actions = []
            if (r.status === 'pending') {
              actions.push(`<button type="button" class="btn btn-primary" style="margin-right:6px;font-size:11px;padding:4px 10px" onclick="approveJoin('${r.id}')">Approve</button>`)
              actions.push(`<button type="button" class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px" onclick="rejectJoin('${r.id}')">Reject</button>`)
            }
            if (r.status === 'approved') {
              actions.push(`<button type="button" class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px" onclick="resendJoinLink('${r.id}')">Resend link</button>`)
            }
            return `<tr>
              <td>${escHtml(r.email)}</td>
              <td style="color:var(--text3);font-size:var(--text-xs);max-width:220px">${msg}</td>
              <td>${escHtml(r.status)}</td>
              <td style="color:var(--text3);font-size:var(--text-xs)">${r.created_at ? new Date(r.created_at).toLocaleString() : '—'}</td>
              <td style="white-space:nowrap">${actions.join('')}</td>
            </tr>`
          }).join('')}
        </table>`
      } catch {
        el.innerHTML = '<div style="color:var(--danger)">Failed to load join requests</div>'
      }
    }

    async function approveJoin(id) {
      try {
        const res = await fetch('/api/admin/join-requests/' + encodeURIComponent(id) + '/approve', { method: 'POST' })
        const data = await res.json()
        if (res.ok) {
          loadJoinRequests()
        } else {
          alert(data.error || 'Failed')
        }
      } catch {
        alert('Connection error')
      }
    }

    async function rejectJoin(id) {
      if (!confirm('Reject this request?')) return
      try {
        const res = await fetch('/api/admin/join-requests/' + encodeURIComponent(id) + '/reject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        })
        const data = await res.json()
        if (res.ok) loadJoinRequests()
        else alert(data.error || 'Failed')
      } catch {
        alert('Connection error')
      }
    }

    async function resendJoinLink(id) {
      try {
        const res = await fetch('/api/admin/join-requests/' + encodeURIComponent(id) + '/resend-link', { method: 'POST' })
        const data = await res.json()
        if (res.ok) alert('Login link sent again.')
        else alert(data.error || 'Failed')
      } catch {
        alert('Connection error')
      }
    }

    async function generateCode() {
      const maxUses = parseInt(document.getElementById('max-uses').value) || 1
      const status = document.getElementById('gen-status')
      try {
        const res = await fetch('/api/admin/codes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ max_uses: maxUses }),
        })
        const data = await res.json()
        if (res.ok) {
          status.innerHTML = `<span style="color:var(--success)">Generated: <strong style="letter-spacing:0.15em">${data.code}</strong></span>`
          loadCodes()
        } else {
          status.innerHTML = `<span style="color:var(--danger)">${data.error || 'Failed'}</span>`
        }
      } catch {
        status.innerHTML = '<span style="color:var(--danger)">Connection error</span>'
      }
    }

    async function loadCodes() {
      const el = document.getElementById('codes-table')
      try {
        const res = await fetch('/api/admin/codes')
        const data = await res.json()
        const codes = data.codes || []
        if (codes.length === 0) {
          el.innerHTML = '<div style="color:var(--text3)">No codes yet</div>'
          return
        }
        el.innerHTML = `<table>
          <tr><th>Code</th><th>Used</th><th>Max</th><th>Created</th></tr>
          ${codes.map(c => `<tr>
            <td class="code-cell">${escHtml(c.code)}</td>
            <td class="used-cell">${c.times_used}</td>
            <td>${c.max_uses}</td>
            <td style="color:var(--text3);font-size:var(--text-xs)">${new Date(c.created_at).toLocaleDateString()}</td>
          </tr>`).join('')}
        </table>`
      } catch {
        el.innerHTML = '<div style="color:var(--danger)">Failed to load</div>'
      }
    }

    async function loadAccounts() {
      const el = document.getElementById('accounts-table')
      try {
        const res = await fetch('/api/admin/accounts')
        const data = await res.json()
        const accounts = data.accounts || []
        if (accounts.length === 0) {
          el.innerHTML = '<div style="color:var(--text3)">No accounts</div>'
          return
        }
        el.innerHTML = `<table>
          <tr><th>Email</th><th>Teams</th><th>Owner</th><th>Created</th></tr>
          ${accounts.map(a => `<tr>
            <td>${escHtml(a.email)}</td>
            <td style="color:var(--text3);font-size:var(--text-xs)">${escHtml(a.teams || '—')}</td>
            <td>${a.is_owner ? '★' : ''}</td>
            <td style="color:var(--text3);font-size:var(--text-xs)">${new Date(a.created_at).toLocaleDateString()}</td>
          </tr>`).join('')}
        </table>`
      } catch {
        el.innerHTML = '<div style="color:var(--danger)">Failed to load</div>'
      }
    }

    async function loadFallbackTokens() {
      const el = document.getElementById('fallback-tokens')
      try {
        const res = await fetch('/api/admin/fallback-tokens')
        const data = await res.json()
        const tokens = data.tokens || []
        if (tokens.length === 0) {
          el.textContent = 'No fallback tokens (email is working normally)'
          return
        }
        el.innerHTML = tokens.map(t => `
          <div style="margin-bottom:12px;padding:8px;border:1px solid var(--border)">
            <div style="color:var(--text);margin-bottom:4px">${escHtml(t.email)}</div>
            <div class="fallback-token">${window.location.origin}/api/auth/verify?token=${t.token}</div>
          </div>
        `).join('')
      } catch {
        el.textContent = 'Failed to load'
      }
    }
  </script>
</body>
</html>
